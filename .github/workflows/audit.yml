name: Security Audit

on:
  schedule:
    - cron: "0 0 * * 1"
  pull_request:
    branches: [main, master]

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run audit
        run: cargo audit
