name: Performance Benchmarks

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  bench:
    name: Run benchmarks and detect regressions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # Restore a cached criterion baseline from the target branch so we can
      # compare PR results against it.  The cache key includes the branch name
      # so each long-lived branch keeps its own baseline.
      - name: Restore criterion baseline cache
        uses: actions/cache@v5
        with:
          path: target/criterion
          key: criterion-baseline-${{ github.base_ref || github.ref_name }}
          restore-keys: |
            criterion-baseline-main
            criterion-baseline-master

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Cache compiled dependencies to keep CI fast.
      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      # ---------- graph layout benchmark ----------
      - name: Benchmark — graph layout
        run: |
          cargo bench --bench graph_bench -- \
            --save-baseline ci-current \
            --baseline    ci-previous \
            2>&1 | tee /tmp/bench-graph.txt || true
        working-directory: crates/gitv-git-core

      # ---------- search benchmark ----------
      - name: Benchmark — search engine
        run: |
          cargo bench --bench search_bench -- \
            --save-baseline ci-current \
            --baseline    ci-previous \
            2>&1 | tee /tmp/bench-search.txt || true
        working-directory: crates/gitv-git-core

      # ---------- memory benchmark ----------
      - name: Benchmark — memory usage
        run: |
          cargo bench --bench memory_bench \
            2>&1 | tee /tmp/bench-memory.txt
        working-directory: crates/gitv-git-core

      # Promote the current run to the new "previous" baseline so the next
      # CI run (or PR) compares against this one.
      - name: Promote baseline
        run: |
          cargo bench --bench graph_bench  -- --save-baseline ci-previous --no-run 2>/dev/null || true
          cargo bench --bench search_bench -- --save-baseline ci-previous --no-run 2>/dev/null || true
        working-directory: crates/gitv-git-core

      # Fail the job if any benchmark regressed by more than 10 %.
      # Criterion prints "Performance has regressed" for regressions.
      - name: Check for regressions
        run: |
          FAILED=0
          for f in /tmp/bench-graph.txt /tmp/bench-search.txt; do
            if grep -q "Performance has regressed" "$f"; then
              echo "::error::Regression detected in $f"
              grep "Performance has regressed" "$f"
              FAILED=1
            fi
          done
          exit $FAILED

      # Debug: find where criterion actually put its output.
      - name: Debug — locate criterion output
        run: |
          echo "CWD: $(pwd)"
          echo "CARGO_TARGET_DIR: ${CARGO_TARGET_DIR:-unset}"
          find "$(pwd)" -name "estimates.json" -not -path "*/target/release/*" -not -path "*/target/debug/*" 2>/dev/null | head -10 || echo "(no estimates.json)"

      # Check absolute performance targets (Req 27.6).
      # Parses criterion JSON results and compares against targets in
      # AGENTS.md. Produces a Markdown table written to the job summary.
      - name: Check absolute performance targets
        run: |
          python3 scripts/check_bench_targets.py target/criterion

      # Upload the full criterion HTML report as an artifact so reviewers
      # can browse detailed plots without re-running locally.
      - name: Upload benchmark report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: criterion-report-${{ github.sha }}
          path: target/criterion
          retention-days: 30
