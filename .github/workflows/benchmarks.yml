name: Performance Benchmarks

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  bench:
    name: Run benchmarks and detect regressions
    runs-on: ubuntu-latest

    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target/cargo-target
      CRITERION_HOME: ${{ github.workspace }}/target/criterion

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Restore cached criterion baselines from the target branch.
      # The key is split so the benchmark-source hash is its own segment and
      # restore-keys are scoped to that segment.  This means:
      #   - bench source changed → benchHash differs → restore-key prefix
      #     matches nothing → no baseline restored → criterion runs fresh
      #     (no spurious comparison across methodology changes).
      #   - bench unchanged, lib source changed → benchHash same → restore-key
      #     matches → valid baseline comparison, regressions detected normally.
      - name: Restore criterion baseline cache
        uses: actions/cache@v5
        with:
          path: target/criterion
          key: criterion-baseline-${{ github.base_ref || github.ref_name }}-${{ hashFiles('crates/gitv-git-core/benches/*.rs') }}-${{ hashFiles('crates/gitv-git-core/src/**/*.rs', '**/Cargo.lock') }}
          restore-keys: |
            criterion-baseline-${{ github.base_ref || github.ref_name }}-${{ hashFiles('crates/gitv-git-core/benches/*.rs') }}-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Cache compiled dependencies (separate from criterion baselines).
      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/cargo-target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      # Build benchmarks first (without || true) so compile errors fail fast.
      - name: Build benchmarks
        run: cargo bench --bench graph_bench --bench search_bench --bench memory_bench --no-run
        working-directory: crates/gitv-git-core

      # ---------- graph layout benchmark ----------
      - name: Benchmark — graph layout
        run: |
          cargo bench --bench graph_bench -- \
            --save-baseline graph-baseline \
            2>&1 | tee /tmp/bench-graph.txt
        working-directory: crates/gitv-git-core

      # ---------- search benchmark ----------
      - name: Benchmark — search engine
        run: |
          cargo bench --bench search_bench -- \
            --save-baseline search-baseline \
            2>&1 | tee /tmp/bench-search.txt
        working-directory: crates/gitv-git-core

      # ---------- memory benchmark ----------
      - name: Benchmark — memory usage
        run: |
          cargo bench --bench memory_bench \
            2>&1 | tee /tmp/bench-memory.txt
        working-directory: crates/gitv-git-core

      # Fail the job if benchmarks regressed beyond noise tolerance.
      # Only fails if: >=2 significant regressions (≥10% each, unlikely to be
      # noise) OR a single benchmark regressed by >15%.
      #
      # When benchmark source files changed, the cache key above ensures no
      # stale baseline is restored, so criterion runs fresh and produces no
      # "change:" lines — this check trivially passes.  The absolute target
      # check below still enforces the real perf budget in that case.
      - name: Check for regressions
        run: python3 scripts/check_regressions.py /tmp/bench-graph.txt /tmp/bench-search.txt

      # Check absolute performance targets (Req 27.6).
      # Parses criterion JSON results and compares against targets in
      # AGENTS.md. Produces a Markdown table written to the job summary.
      - name: Check absolute performance targets
        run: |
          python3 scripts/check_bench_targets.py target/criterion

      # Upload the full criterion HTML report as an artifact so reviewers
      # can browse detailed plots without re-running locally.
      - name: Upload benchmark report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: criterion-report-${{ github.sha }}
          path: target/criterion
          retention-days: 30
