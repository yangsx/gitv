name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.config.name }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: macOS
            os: macos-latest
            target: x86_64-apple-darwin
          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.config.target }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install tauri-cli
        run: |
          cargo install cargo-binstall
          cargo binstall tauri-cli --no-confirm

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build (cargo tauri)
        run: cargo tauri build

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: gitv-${{ matrix.config.name }}
          path: src-tauri/target/release/bundle/
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5

      - name: Generate release notes
        run: |
          echo "## Gitv ${{ github.ref_name }}" > /tmp/release-notes.md
          echo "" >> /tmp/release-notes.md
          echo "Artifacts built for Linux, macOS, and Windows." >> /tmp/release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Gitv ${{ github.ref_name }}
          body_path: /tmp/release-notes.md
          files: |
            gitv-Linux/**
            gitv-macOS/**
            gitv-Windows/**
          draft: true
          prerelease: false
