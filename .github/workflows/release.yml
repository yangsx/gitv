name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.config.name }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux
          # Universal binary covers both Apple Silicon and Intel Macs.
          # Built on an ARM runner — GitHub retired the last free Intel
          # runner (macos-13) in Dec 2025.
          - name: macOS universal
            os: macos-latest
            targets: aarch64-apple-darwin,x86_64-apple-darwin
            build-target: universal-apple-darwin
            artifact: macos
          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows

    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.config.targets || matrix.config.target }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install tauri-cli
        run: |
          cargo install cargo-binstall
          cargo binstall tauri-cli --no-confirm

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build (cargo tauri)
        run: cargo tauri build --target ${{ matrix.config.build-target || matrix.config.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: gitv-${{ matrix.config.artifact }}
          path: target/${{ matrix.config.build-target || matrix.config.target }}/release/bundle/
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7

      - name: Generate release notes
        run: |
          echo "## Gitv ${{ github.ref_name }}" > /tmp/release-notes.md
          echo "" >> /tmp/release-notes.md
          echo "Artifacts built for Linux, macOS, and Windows." >> /tmp/release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Gitv ${{ github.ref_name }}
          body_path: /tmp/release-notes.md
          files: |
            gitv-linux/**/*.deb
            gitv-linux/**/*.AppImage
            gitv-macos/**/*.dmg
            gitv-windows/**/*.msi
            gitv-windows/**/*.exe
          draft: true
          prerelease: false
